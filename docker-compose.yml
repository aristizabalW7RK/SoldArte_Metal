services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: soldarte
      POSTGRES_PASSWORD: soldarte123
      POSTGRES_DB: soldarte_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
